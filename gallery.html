<!DOCTYPE html>
<html lang="ru" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Галерея — Компьютерный клуб</title>
    <link rel="stylesheet" type="text/css" href="Css/style.css">
    <link rel="stylesheet" type="text/css" href="Css/fonts.css">
    <link rel="stylesheet" type="text/css" href="Css/gallery.css">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500&display=swap&subset=cyrillic" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha2/css/bootstrap.min.css"
        integrity="sha384-DhY6onE6f3zzKbjUPRc2hOzGAdEf4/Dz+WJwBvEYL/lkkIsI3ihufq9hk9K4lVoK" crossorigin="anonymous">
    <style>
        body { font-family: "OpenSans-light", Arial, Helvetica, sans-serif; }
        ul { font-family: "Roboto", "OpenSans-light", Arial, Helvetica, sans-serif; font-weight: 400; }

        .gallery-section {
            padding: 50px 20px;
            background: #f8f9fa;
        }
        .gallery-category {
            margin-bottom: 50px;
        }
        .gallery-category h4 {
            text-align: center;
            font-weight: 300;
            font-size: 1.4rem;
            color: #313131;
            margin-bottom: 16px;
        }
        /* все фото одинаковой высоты, без искажений */
        .gallery-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border-radius: 4px;
            display: block;
        }
        /* tall = точно высота двух правых фото + gap между ними (g-3 = 1rem = 16px) */
        .gallery-img.tall {
            height: calc(260px * 2 + 1rem);
        }
        @media (max-width: 768px) {
            .gallery-img, .gallery-img.tall { height: 200px; }
        }
    </style>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="JS/script.js"></script>
    <script src="JS/slider.js"></script>
</head>

<body>
    <header>
        <nav>
            <img src="Img/1681558827_papik-pro-p-logotip-kompyuternogo-kluba-vektor-28.jpg" alt="Логотип клуба" class="logo" width="100">
            <ul>
                <li class="header-inner--items"><a href="index.html#top">Главная</a></li>
                <li class="header-inner--items"><a href="index.html#services">Услуги</a></li>
                <li class="header-inner--items"><a href="index.html#menu">Наши предложения</a></li>
                <li class="header-inner--items"><a href="gallery.html" title="Фотогалерея">Галерея</a></li>
                <li class="header-inner--items"><a href="blog.html">Блог</a></li>
                <li class="header-inner--items"><a href="contacts.html">Контакты</a></li>
                <li class="header-inner--items"><a href="shop.html">Магазин</a></li>
            </ul>
            <div id="hamburger" class="icon">&#9776;</div>
        </nav>
    </header>

    <main>
        <section class="top" id="top">
            <img src="Img/large_80.jpg" alt="Обложка" class="top-img" style="width:100%; height:300px; object-fit:cover;">
        </section>

        <!-- Фотогалерея -->
        <section class="gallery-section">
            <h1 class="main-title">Фотогалерея</h1>
            <div class="delimiter"></div>
            <p class="main-title-description" style="margin-bottom: 40px;">Наш зал, ПК, VR-оборудование и соревнования</p>

            <div class="container">

                <!-- Залы -->
                <div class="gallery-category">
                    <h4>Игровой зал</h4>
                    <div class="row g-3">
                        <div class="col-12 col-md-6">
                            <img src="Img/large_80.jpg" class="gallery-img tall" alt="Игровой зал">
                        </div>
                        <div class="col-12 col-md-6">
                            <div class="row g-3">
                                <div class="col-12">
                                    <img src="Img/hall-bootcamp.png" class="gallery-img" alt="VIP зал">
                                </div>
                                <div class="col-12">
                                    <img src="Img/hall-red.jpg" class="gallery-img" alt="Игровой зал">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Игровые ПК -->
                <div class="gallery-category">
                    <h4>Игровые ПК</h4>
                    <div class="row g-3">
                        <div class="col-12 col-md-4">
                            <img src="Img/d6956c4acbe74c1bbbeb511670da18ac.jpg" class="gallery-img" alt="Игровой ПК">
                        </div>
                        <div class="col-12 col-md-4">
                            <img src="Img/pc-hyperpc.jpg" class="gallery-img" alt="HyperPC сборки">
                        </div>
                        <div class="col-12 col-md-4">
                            <img src="Img/pc-rgb.jpg" class="gallery-img" alt="RGB системники">
                        </div>
                    </div>
                </div>

                <!-- VR-зона -->
                <div class="gallery-category">
                    <h4>VR-зона</h4>
                    <div class="row g-3">
                        <div class="col-12 col-md-4">
                            <img src="Img/IMGP4896.jpg" class="gallery-img" alt="VR симулятор">
                        </div>
                        <div class="col-12 col-md-4">
                            <img src="Img/vr-beatsaber.jpg" class="gallery-img" alt="Beat Saber VR">
                        </div>
                        <div class="col-12 col-md-4">
                            <img src="Img/vr-motion.jpg" class="gallery-img" alt="VR Motion">
                        </div>
                    </div>
                </div>

                <!-- Соревнования -->
                <div class="gallery-category">
                    <h4>Соревнования</h4>
                    <div class="row g-3">
                        <div class="col-12 col-md-8">
                            <img src="Img/tournament-big.jpg" class="gallery-img tall" alt="Большой турнир">
                        </div>
                        <div class="col-12 col-md-4">
                            <div class="row g-3">
                                <div class="col-12">
                                    <img src="Img/tournament-green.jpg" class="gallery-img" alt="Командный турнир">
                                </div>
                                <div class="col-12">
                                    <img src="Img/166564948711.jpg" class="gallery-img" alt="Турнир клуба">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </section>

    </main>

    <footer>
        <nav>
            <ul>
                <li><a href="index.html#top">Главная</a></li>
                <li><a href="index.html#services">Услуги</a></li>
                <li><a href="gallery.html">Галерея</a></li>
                <li><a href="blog.html">Блог</a></li>
                <li><a href="contacts.html">Контакты</a></li>
                <li><a href="shop.html">Магазин</a></li>
            </ul>
        </nav>
        <div class="brand">
            <img src="Img/1681558827_papik-pro-p-logotip-kompyuternogo-kluba-vektor-28.jpg" alt="Логотип клуба" width="80">
            <span>AWESOME CLUB</span>
        </div>
        <div class="social">
            <a href="#" title="Facebook" target="_blank"><img class="social-img" src="Img/001-facebook.png" alt="Facebook"></a>
            <a href="#" title="Instagram" target="_blank"><img class="social-img" src="Img/005-instagram.png" alt="Instagram"></a>
            <a href="#" title="Twitter" target="_blank"><img class="social-img" src="Img/007-twitter.png" alt="Twitter"></a>
        </div>
        <div class="copyright">© PC CLUB 2026</div>
    </footer>

    <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.0.0-alpha2/js/bootstrap.bundle.min.js"
        integrity="sha384-BOsAfwzjNJHrJ8cZidOg56tcQWfp6y72vEJ8xQ9w6Quywb24iOsW913URv1IS4GD" crossorigin="anonymous"></script>
</body>

</html>
